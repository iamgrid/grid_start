name: Build and Deploy

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
  # "workflow_dispatch:" adds the "Run workflow" button to grid_start > Actions > "Build and Deploy" on github.com
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # - name: Deploy via FTP
      #   uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      #   with:
      #     server: ftp.iamgrid.co.uk
      #     username: ${{ secrets.FTP_USERNAME }}
      #     password: ${{ secrets.FTP_PASSWORD }}
      #     protocol: ftp
      #     port: 21
      #     # security: strict
      #     # log-level: verbose
      #     local-dir: ./dist/
      #     server-dir: /public_html/grid_start/

      - name: Attempt to Deploy via FTP, Retry Twice (set via attempt_limit)
        uses: Wandalen/wretry.action@master
        with:
          action: SamKirkland/FTP-Deploy-Action@v4.4.0
          with: |
            server: ftp.iamgrid.co.uk
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            protocol: ftp
            port: 21
            # security: strict
            # log-level: verbose
            local-dir: ./dist/
            server-dir: /public_html/grid_start/
          attempt_limit: 2
          # attempt_delay is set in milliseconds
          attempt_delay: 2000